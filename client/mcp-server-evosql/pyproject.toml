[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp-server-evosql"
version = "1.0.0"
description = "MCP (Model Context Protocol) server backed by EvolutionDB — gives Claude Desktop / Claude Code persistent long-term memory."
requires-python = ">=3.9"
license = {text = "MIT"}
readme = "README.md"
keywords = ["mcp", "model-context-protocol", "evolutiondb", "claude", "long-term-memory"]
authors = [
    {name = "EvolutionDB"}
]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.12",
]
dependencies = []

[project.scripts]
mcp-server-evosql = "mcp_server_evosql.__main__:main"

[tool.setuptools.packages.find]
include = ["mcp_server_evosql*"]
