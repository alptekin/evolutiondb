# docker-compose.demo.yml — single-shot agent demo.
#
# Brings up EvolutionDB + the agent container + (optionally) a local
# Ollama LLM. The agent picks its LLM backend by env var:
#
#   1. OLLAMA_BASE_URL  → OllamaLLM   (local, CPU-friendly)
#   2. ANTHROPIC_API_KEY → ClaudeLLM  (cloud)
#   3. neither           → StubLLM    (deterministic, offline / CI)
#
# Three ways to run:
#
#   # Default — StubLLM (offline, no key, no GPU):
#   docker compose -f docker-compose.demo.yml up --build --abort-on-container-exit
#
#   # Real Claude:
#   ANTHROPIC_API_KEY=sk-ant-... \
#     docker compose -f docker-compose.demo.yml up --build --abort-on-container-exit
#
#   # Local Ollama (Llama 3.1 8B Instruct on CPU):
#   docker compose -f docker-compose.demo.yml --profile local-llm up \
#       --build --abort-on-container-exit
#
# The first run with --profile local-llm pulls the 4-bit-quantised
# Llama 3.1 8B model on first boot (~5 GB on disk, one-shot download).
# Subsequent runs reuse the persistent volume.
#
# The exit code of the `agent` container becomes the compose run's
# exit code, so this is also a CI-friendly "did the agent demo break".
services:
  evosql:
    # Build evosql from the repo so the demo always tracks the current
    # code (and works natively on whatever architecture the host runs
    # — the published image is x86_64-only). Removes the need for a
    # separate `docker compose pull` step too.
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      EVOSQL_USER_NAME: admin
      EVOSQL_PASSWORD: admin
    expose:
      - "9967"
      - "5433"
    # Optional: surface the ports on the host so an analyst can
    # connect with DBeaver while the agent is running.
    ports:
      - "9967:9967"
      - "5433:5433"

  agent:
    build:
      context: .
      dockerfile: examples/full_agent_demo/Dockerfile
    environment:
      EVOSQL_HOST: evosql
      EVOSQL_PORT: 9967
      EVOSQL_USER: admin
      EVOSQL_PASSWORD: admin
      # Pass through ANTHROPIC_API_KEY from the host shell. When
      # unset the agent falls back to the deterministic StubLLM
      # — unless the local-llm profile activates Ollama.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL:   ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Pre-baked address for the Ollama service in the local-llm
      # profile. Empty on the default profile so make_llm() doesn't
      # think Ollama is reachable.
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}
    depends_on:
      - evosql

  # ----- Web UI (agent-web profile) ---------------------------------
  # Same Dockerfile as the test runner above, but command override
  # boots a FastAPI server on :8000 that serves examples/full_agent_demo
  # /static/index.html — a chat page where you type messages and watch
  # the agent's tool calls + memory grow live.
  #
  # Run:
  #   docker compose -f docker-compose.demo.yml --profile web up -d
  # Then open http://localhost:8000
  #
  # Pair with --profile local-llm to drive the page through Ollama:
  #   docker compose -f docker-compose.demo.yml --profile web \
  #       --profile local-llm --env-file .env up -d
  agent-web:
    build:
      context: .
      dockerfile: examples/full_agent_demo/Dockerfile
    profiles: [web]
    # Wait for evosql, then run uvicorn binding to 0.0.0.0 so the host
    # port mapping reaches it. Single-line `exec` so YAML / sh parsing
    # doesn't drop the --host flag.
    command:
      - sh
      - -c
      - >
        for i in $$(seq 1 60); do
          python3 -c 'import socket; s=socket.create_connection(("evosql",9967),1); s.close()' 2>/dev/null && break;
          sleep 1;
        done;
        cd /app && exec python3 -m uvicorn web_server:app --host 0.0.0.0 --port 8000 --proxy-headers
    environment:
      EVOSQL_HOST: evosql
      EVOSQL_PORT: 9967
      EVOSQL_USER: admin
      EVOSQL_PASSWORD: admin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL:   ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}
      # Optional: override the session id / store prefix the web UI
      # binds to so two browser tabs against two compose stacks don't
      # mix.
      WEB_STORE_PREFIX:  ${WEB_STORE_PREFIX:-web}
      WEB_SESSION_ID:    ${WEB_SESSION_ID:-browser-session}
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      - evosql

  # ----- Optional: local Ollama LLM ----------------------------------
  # Activate with `--profile local-llm`. The init container pre-pulls
  # the configured model so the first agent turn doesn't time out
  # waiting for a 5 GB download.
  ollama:
    image: ollama/ollama:latest
    profiles: [local-llm]
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"

  ollama-pull:
    image: ollama/ollama:latest
    profiles: [local-llm]
    depends_on:
      - ollama
    entrypoint:
      - sh
      - -c
      - |
        # Wait for ollama to come up, then pull the model. exits clean
        # so it doesn't block compose on success.
        for i in $$(seq 1 30); do
          if ollama list -- 2>/dev/null; then break; fi
          sleep 2
        done
        ollama pull "$${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}"
    environment:
      OLLAMA_HOST:  http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}

volumes:
  ollama_data:
