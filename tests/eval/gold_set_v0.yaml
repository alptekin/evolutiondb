# Gold Eval Set v0 — MCP memory retrieval quality
#
# Each entry below is a query you'd actually ask Claude through the
# MCP memory layer. For each, list 3-5 mem_keys from your live store
# that you consider the IDEAL retrieval — the rows that *should* have
# come back in the top-5.
#
# Workflow to label a query:
#
#   1. Find candidate keys:
#        python tests/eval_memory_quality.py \
#            --collect "Süreyya'nın e-postası ne" \
#            --prefix mcp
#      Top-20 candidates print with key + truncated fact.
#
#   2. Pick the 3-5 best, paste them under ideal_keys.
#
#   3. Repeat for each query. The harness skips queries with empty
#      ideal_keys — partial fills are OK to start, but aim for ≥20
#      filled queries before declaring the baseline.
#
# Append-only discipline: never delete or mutate a query once it has
# been labeled. If the underlying data drifts and the ideal_keys are
# no longer correct, add a new query id (q001 → q001_v2) and leave
# the old one as historical record. This protects month-over-month
# comparisons.
#
# Coverage target: 40 queries, 10 per category.
#   - simple_fact: single-entity recall ("X'in e-postası ne")
#   - recent:      time-bounded ("son hafta X")
#   - aggregation: cross-row synthesis ("en çok X")
#   - relational:  multi-entity ("X'te kim aktif")

