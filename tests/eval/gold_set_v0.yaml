      çıkartılamaz; "tek alışveriş kaydı var, tutar metinde yok"
      cevabı doğru kabul edilir.
    notes: >
      Stage 5 synthesis eval kapsamında değerlendirilir. expected_answer
      mevcut veri-bazlı; eğer ileride fatura body'sine PDF parse'ı
      eklenirse veya kullanıcı gerçek tutarı manuel yazarsa güncellensin.

