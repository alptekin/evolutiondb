services:
  evosql:
    build: .
    ports:
      - "5433:5433"
      - "9967:9967"
      - "9970:9970"   # Task 211: CDC streaming (JSON Lines)
    volumes:
      - evosql-data:/data
    environment:
      EVOSQL_USER_NAME: admin
      EVOSQL_PASSWORD: admin
      EVOSQL_CDC_PORT: 9970
      # Task 213 — drop the auto-RECLAIM tick to 2s so TTL-driven row
      # expiry runs visibly inside a normal test iteration. Production
      # leaves the default 30s (set this back if running benchmarks).
      EVOSQL_AUTO_RECLAIM_INTERVAL_SEC: 2
      EVOSQL_ENCRYPTION_KEY: ${EVOSQL_ENCRYPTION_KEY:-MuhtacOldugunKudret!DamarlarindakiAsilKandaMevcuttur}
      # To generate a random password, remove or comment out EVOSQL_PASSWORD
      # To disable encryption, set EVOSQL_ENCRYPTION_KEY to empty string

  cli:
    build: ./cli
    depends_on:
      - evosql
    stdin_open: true
    tty: true
    entrypoint: ["sleep", "infinity"]

volumes:
  evosql-data:
