# docker-compose.bench.yml — companion services for the cross-vendor
# benchmark sweep (bench/vendors/run_all.py).
#
# Brings up the open-source backends that ship as Docker images:
#   - mongo:7        for the MongoDB driver
#   - weaviate:1.30  for the Weaviate driver
#
# The Mem0 / Zep / Pinecone columns require either an API key
# (Pinecone, Zep cloud, Mem0 SaaS) or a self-hosted upstream image
# that's licensed separately — the runner skips those gracefully when
# their environment variables aren't set, so this file doesn't pull
# them by default.
#
# Usage:
#   docker compose up -d                        # main evosql server
#   docker compose -f docker-compose.bench.yml up -d
#   pip install pymongo weaviate-client
#   python3 bench/vendors/run_all.py --iters 200
#   docker compose -f docker-compose.bench.yml down
version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: bench-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1})' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.0
    container_name: bench-weaviate
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: bench-weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
