replicaCount: 1

image:
  repository: evolutiondb/evolutiondb
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

auth:
  username: admin
  password: ""          # If empty, random password generated (check pod logs)
  existingSecret: ""    # Use existing K8s secret instead of creating one

encryption:
  enabled: false
  key: ""               # Passphrase for TDE (AES-256), stored in a K8s Secret
  keyCommand: ""        # KMS hook: a command whose stdout is the passphrase
                        # (EVOSQL_ENCRYPTION_KEY_CMD), e.g. "vault kv get -field=
                        # passphrase secret/evosql". Takes precedence over key.
  existingSecret: ""    # Use existing K8s secret for encryption key

machineId: ""           # Machine ID (0-1023) for snowflake_id(). Empty = from hostname

# Network binding inside the pod. The engine defaults to LOOPBACK for safety, so
# in Kubernetes it MUST bind 0.0.0.0 or the (headless) Service cannot reach it.
network:
  bind: "0.0.0.0"

# Wire-level hardening. TLS termination is usually done at the Ingress, so these
# default off; enable pgSasl to negotiate SCRAM-SHA-256 (password never on wire).
security:
  pgSasl: false         # EVOSQL_PG_SASL — require SCRAM-SHA-256 on the PG wire
  requireTls: false     # EVOSQL_REQUIRE_TLS — refuse non-loopback plaintext PG

# Write-ahead log durability/ops.
wal:
  checkpointIntervalSec: 300   # EVOSQL_CHECKPOINT_INTERVAL_SEC; 0 = only at shutdown
  archive: false               # EVOSQL_WAL_ARCHIVE (needed for PITR; grows on disk)

service:
  type: ClusterIP
  pgPort: 5433          # PostgreSQL wire protocol
  evoPort: 9967         # Native EVO protocol

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: evolutiondb.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""      # Empty = default storage class
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data      # the engine's EVOSQL_DATA_DIR points here (evosql.db + WAL)

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

nodeSelector: {}
tolerations: []
affinity: {}

serviceMonitor:
  enabled: false
  interval: 30s

# Multi-tenant SaaS control plane (Phase 2 #5). When enabled, this creates the
# ServiceAccount + namespaced RBAC that the KubernetesTenantBackend needs to
# provision DEDICATED tenants as one StatefulSet + Service + Secret + PVC each
# (pod-per-tenant fault isolation). Most tenants stay on the SHARED engine above
# (GRANT-isolated); only the premium/dedicated tier gets its own pod. The
# control-plane process (the MCP server, run from the agent image with the
# router + KubernetesTenantBackend) mounts this SA. Off by default.
controlPlane:
  enabled: false
  serviceAccountName: ""        # empty = "<fullname>-control-plane"
  # Defaults the control plane uses when it provisions a dedicated tenant.
  tenant:
    image:
      repository: evolutiondb/evolutiondb
      tag: "latest"
    storageSize: 1Gi
    storageClass: ""            # empty = cluster default
    memLimitMb: 0               # 0 = engine default; else EVOSQL_BUFFER_POOL_SIZE cap
  # Operator control-plane UI (evosql-control-plane): an authenticated browser
  # front door to manage tenants (provision / suspend / token / tier / DSAR).
  # Runs from the agent image; OFF by default.
  ui:
    enabled: false
    port: 8900
    ratePerMin: 120
    tenantSecret: ""            # REQUIRED when enabled — derives every tenant DB password
    controlToken: ""            # static operator superuser token (fallback to OIDC)
    backupDir: /var/lib/evosql/backups   # where dedicated-tenant backups are written
    backupExistingClaim: ""     # PVC name to persist backups; empty = emptyDir (ephemeral)
    backupKeep: 0               # retention: keep N newest backups per tenant (0 = keep all)
    operators: ""               # comma list of OIDC sub/email allowed as operators
    oidc:
      issuer: ""                # EVOSQL_OIDC_ISSUER — operator SSO (MFA at the IdP)
      audience: ""
    service:
      type: ClusterIP
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: "1", memory: 512Mi }
    ingress:
      enabled: false
      className: ""
      annotations: {}
      host: control.evolutiondb.local
      tls: []

# Optional standalone agent (MCP server + web UI). Off by default — the engine
# chart stands alone. When enabled it runs as its own Deployment + Service,
# connects to the engine Service, and exposes the human-approval web UI.
agent:
  enabled: false
  image:
    repository: evolutiondb/evolution-agent
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  webPort: 8800
  # Auth for the agent's /api/*: set a static token, OR enable OIDC SSO below.
  webToken: ""              # EVOSQL_WEB_TOKEN (stored in a Secret); empty = open
  ratePerMin: 60            # EVOSQL_WEB_RATE_PER_MIN
  oidc:
    issuer: ""              # EVOSQL_OIDC_ISSUER — enable OIDC bearer-JWT SSO
    audience: ""            # EVOSQL_OIDC_AUDIENCE
  anthropicApiKey: ""       # ANTHROPIC_API_KEY (Secret); empty = chat disabled
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: agent.evolutiondb.local
    tls: []
