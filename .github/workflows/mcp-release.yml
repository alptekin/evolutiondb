name: MCP Release — PyPI + MCP Registry

# Triggers on tag push `v*` (e.g. `git tag v1.1.1 && git push --tags`).
# After this lands, every tagged release flows automatically:
#   1. Build mcp-server-evolutiondb sdist + wheel
#   2. Upload to PyPI (Trusted Publishing via OIDC; falls back to
#      PYPI_API_TOKEN secret if the OIDC publisher isn't configured)
#   3. Update the MCP Registry entry (GitHub OIDC — no secret)
#
# The companion `dxt-build.yml` workflow runs in parallel on the same
# tag and attaches the per-platform .dxt files to the GitHub Release.
#
# The pre-existing `release.yml` builds the native libevosql-memory
# binaries; the three workflows together cover one full distribution
# cycle.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-publish (e.g. v1.1.0)"
        required: true

permissions:
  contents: read
  id-token: write   # PyPI Trusted Publishing + MCP Registry OIDC need this

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-server-evolutiondb/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify version matches the tag
        working-directory: client/mcp-server-evosql
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          py_ver=$(python3 -c "import tomllib;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$ver" != "$py_ver" ]; then
            echo "::error::tag ${tag} (=> ${ver}) does not match pyproject version ${py_ver}"
            exit 1
          fi
          echo "tag and pyproject agree on ${ver}"

      - name: Build sdist + wheel
        working-directory: client/mcp-server-evosql
        run: |
          python3 -m pip install --upgrade pip build
          rm -rf dist build *.egg-info
          python3 -m build --sdist --wheel
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/mcp-server-evosql/dist
          # If PYPI_API_TOKEN is set as a repo secret, use it; otherwise
          # the action falls back to PyPI Trusted Publishing via the
          # workflow's OIDC token (set up the publisher at
          # https://pypi.org/manage/project/mcp-server-evolutiondb/settings/publishing/).
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  mcp-registry:
    name: Publish to MCP Registry
    needs: pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify server.json version matches the tag
        working-directory: client/mcp-server-evosql
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          json_ver=$(python3 -c "import json;d=json.load(open('server.json'));print(d['version'])")
          pkg_ver=$(python3 -c "import json;d=json.load(open('server.json'));print(d['packages'][0]['version'])")
          if [ "$ver" != "$json_ver" ] || [ "$ver" != "$pkg_ver" ]; then
            echo "::error::tag ${tag} (=> ${ver}) doesn't match server.json (root=${json_ver}, packages[0]=${pkg_ver})"
            exit 1
          fi
          echo "server.json agrees on ${ver}"

      - name: Wait for PyPI to index the new release
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/mcp-server-evolutiondb/${ver}/json" >/dev/null; then
              echo "PyPI has version ${ver} indexed."
              exit 0
            fi
            echo "Waiting for PyPI to index ${ver} (attempt ${i}/30)..."
            sleep 10
          done
          echo "::error::PyPI never surfaced version ${ver}"
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Authenticate via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: client/mcp-server-evosql
        run: mcp-publisher publish
