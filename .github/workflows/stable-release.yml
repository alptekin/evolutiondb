name: Stable Release

on:
  workflow_dispatch:  # Manuel tetikleme — GitHub Actions UI'dan "Run workflow"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/evolutiondb

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from version.h
        id: version
        run: |
          VERSION=$(grep 'EVODB_VERSION ' evolution/db/version.h | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read version from version.h"
            exit 1
          fi
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_raw=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Stable Release: v${VERSION}"

      - name: Check tag doesn't already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${{ steps.version.outputs.version }} already exists!"
            echo "Bump version in evolution/db/version.h before releasing."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "EvolutionDB ${{ steps.version.outputs.version }}"
          body: |
            ## EvolutionDB ${{ steps.version.outputs.version }}

            ### Docker
            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker pull ${{ env.IMAGE_NAME }}:stable
            ```

            ### Changes
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/main) for details.
          draft: false
          prerelease: false
