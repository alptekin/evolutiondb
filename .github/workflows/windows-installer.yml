name: Windows installer (.exe)

# Wraps the evosql-server-windows-x86_64.exe binary in a Modern UI 2
# NSIS wizard. Gracefully no-ops on tags where the Windows binary
# has not been published yet — that lets this workflow live in main
# while adaptor/{replication,raft,distributed,pool,scram}.c are
# being ported off raw POSIX sockets to Winsock.

on:
  push:
    tags: ["server-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "server-v* tag to build the installer against"
        required: true

permissions:
  contents: write

jobs:
  installer:
    name: Build Windows .exe installer
    runs-on: ubuntu-latest      # makensis cross-compiles cleanly on Linux
    steps:
      # Check out main (default branch). The installer scripts may
      # post-date the release tag we're packaging — the tag is only
      # used by `gh release download` / upload below.
      - uses: actions/checkout@v4

      - name: Resolve target tag and version
        id: tag
        run: |
          input_tag="${{ github.event.inputs.tag }}"
          if [ -n "$input_tag" ]; then
            tag="$input_tag"
          else
            tag="$GITHUB_REF_NAME"
          fi
          # version.h is the source of truth for the version baked into
          # EvolutionDB-<version>-x86_64.exe and the NSIS metadata. The
          # tag is only used for release upload/download.
          chmod +x ./scripts/get-version.sh
          version="$(./scripts/get-version.sh)"
          tag_version="${tag#server-v}"
          if [ "$tag" != "$version" ] && [ "$tag_version" != "$version" ]; then
            echo "::error::tag '$tag' does not match version.h ($version)"
            exit 1
          fi
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Wait up to 15 minutes for the Windows binary. server-build
      # runs in parallel with this workflow on the same tag push and
      # the Windows job is the slowest in the matrix — a one-shot
      # check loses the race and skips the installer. Mirror the
      # 60×15s wait loop used by the macOS and Linux installers.
      - name: Wait for Windows binary on the release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          for i in $(seq 1 60); do
            if gh release view "$tag" --json assets \
                 --jq '.assets[] | select(.name == "evosql-server-windows-x86_64.exe") | .name' \
                 | grep -q evosql-server; then
              echo "release $tag has evosql-server-windows-x86_64.exe"
              echo "binary_present=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Waiting for evosql-server-windows-x86_64.exe on $tag ($i/60) ..."
            sleep 15
          done
          echo "binary_present=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No Windows binary on release $tag after 15 minutes — skipping installer build."

      - name: Install NSIS
        if: steps.check.outputs.binary_present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis

      - name: Download Windows binary
        if: steps.check.outputs.binary_present == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.tag.outputs.tag }}" \
              --pattern 'evosql-server-windows-x86_64.exe' \
              --dir /tmp/dl
          ls -lh /tmp/dl

      - name: Build .exe installer
        if: steps.check.outputs.binary_present == 'true'
        run: |
          cd packaging/windows
          makensis -V2 \
              -DVERSION="${{ steps.tag.outputs.version }}" \
              -DSRC_BINARY=/tmp/dl/evosql-server-windows-x86_64.exe \
              EvolutionDB.nsi
          ls -lh ./*.exe

      - name: sha256 manifest
        if: steps.check.outputs.binary_present == 'true'
        run: |
          cd packaging/windows
          for f in EvolutionDB-*.exe; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Attach to the release
        if: steps.check.outputs.binary_present == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            packaging/windows/EvolutionDB-*.exe
            packaging/windows/*.sha256
          fail_on_unmatched_files: true
