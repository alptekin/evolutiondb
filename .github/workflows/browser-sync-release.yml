name: Browser Sync Release — PyPI

# Triggers on tag push `browser-sync-v*` (e.g. `git tag
# browser-sync-v0.1.0 && git push --tags`). Distinct prefix so it
# does not collide with the other connector tags or the engine's
# `server-v*` / `v*` tags.
#
# What runs on the tag push:
#   1. Build sdist + wheel from client/browser-sync
#   2. Upload to PyPI under the project name
#      `evolutiondb-browser-sync` (Trusted Publishing via OIDC;
#      falls back to PYPI_API_TOKEN if the OIDC publisher is not
#      yet configured).

on:
  push:
    tags: ["browser-sync-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-publish (e.g. browser-sync-v0.1.0)"
        required: true
  # The auto-tag workflow pushes the tag with the default GITHUB_TOKEN,
  # which by GitHub policy cannot trigger another workflow's `push`
  # event. Listen for the auto-tag completion instead so the release
  # chain runs end-to-end on a normal merge.
  workflow_run:
    workflows: ["Browser Sync Auto-tag — push browser-sync-v<version> on pyproject bump"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish evolutiondb-browser-sync to PyPI
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    environment:
      name: pypi-browser-sync
      url: https://pypi.org/project/evolutiondb-browser-sync/
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run fires from `main` (the auto-tag's branch) and
          # carries no tag ref — derive the tag from pyproject below.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify version matches the tag
        working-directory: client/browser-sync
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            ver=$(python3 -c "import tomllib;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
            tag="browser-sync-v${ver}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
            ver="${tag#browser-sync-v}"
          else
            tag="$GITHUB_REF_NAME"
            ver="${tag#browser-sync-v}"
          fi
          py_ver=$(python3 -c "import tomllib;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$ver" != "$py_ver" ]; then
            echo "::error::tag ${tag} (=> ${ver}) does not match pyproject version ${py_ver}"
            exit 1
          fi
          echo "tag and pyproject agree on ${ver}"

      - name: Build sdist + wheel
        working-directory: client/browser-sync
        run: |
          python3 -m pip install --upgrade pip build
          rm -rf dist build *.egg-info
          python3 -m build --sdist --wheel
          ls -lh dist/

      - name: Verify the wheel installs and the entry point runs
        working-directory: client/browser-sync
        run: |
          python3 -m venv /tmp/install-check
          /tmp/install-check/bin/pip install --upgrade pip
          /tmp/install-check/bin/pip install dist/evolutiondb_browser_sync-*.whl
          /tmp/install-check/bin/evolutiondb-browser-sync --help

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: client/browser-sync/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
