name: MCP Auto-tag — push v<version> on pyproject bump

# When a PR that touches client/mcp-server-evosql/pyproject.toml lands
# on `main`, this workflow reads the new version and pushes the matching
# `v<version>` tag automatically — which in turn triggers
# `mcp-release.yml` (PyPI + MCP Registry publish) and `dxt-build.yml`
# (per-platform .dxt artifacts).
#
# Net effect: the only thing the maintainer does for an MCP server
# release is bump the four version fields (pyproject.toml + server.json
# + dxt/manifest.json + SERVER_VERSION constant) inside a normal PR.
# The release pipelines fire on merge with no further commands.
#
# Idempotent: if the tag already exists (e.g. a re-run after a CI
# hiccup) the workflow exits cleanly without re-tagging.

on:
  push:
    branches: [main]
    paths:
      - "client/mcp-server-evosql/pyproject.toml"
  workflow_dispatch:

permissions:
  contents: write   # required to push the tag

concurrency:
  group: mcp-auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history so the tag attaches to HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read mcp-server version
        id: ver
        working-directory: client/mcp-server-evosql
        run: |
          ver=$(python3 -c "import tomllib;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Detected mcp-server-evolutiondb version: ${ver}"

      - name: Skip if tag already exists
        id: gate
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag + push
        if: steps.gate.outputs.exists == 'false'
        env:
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "mcp-server-evolutiondb ${TAG} — auto-tagged from main"
          git push origin "${TAG}"
          echo "Pushed ${TAG}; mcp-release.yml + dxt-build.yml will fire on it."
