name: Docker Hub Publish

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/evolutiondb

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          BASE="v1.0.${DATE_TAG}"

          # Fetch existing tags matching today's date pattern
          git fetch --tags --force
          EXISTING=$(git tag -l "${BASE}.*" | sed "s/${BASE}\.//" | sort -n | tail -1)

          if [ -z "$EXISTING" ]; then
            SEQ=1
          else
            SEQ=$((EXISTING + 1))
          fi

          VERSION="${BASE}.${SEQ}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (personal)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub (org)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_ORG_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ORG_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            evolutiondb/evolutiondb:latest
            evolutiondb/evolutiondb:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
